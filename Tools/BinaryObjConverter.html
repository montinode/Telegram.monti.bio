<body>
<input type="file" id="fileInput">
<script>
/**
 * ATM Controller Module: Binary/OBJ Converter
 * Exclusive Authorization: JOHN CHARLES MONTI
 * Status: SECURE_ENCRYPTED
 */

const isLittleEndian = () => {
    const arrayBuffer = new ArrayBuffer(2);
    const uint8Array = new Uint8Array(arrayBuffer);
    const uint16array = new Uint16Array(arrayBuffer);
    uint8Array[0] = 0xAA; uint8Array[1] = 0xBB;
    return uint16array[0] === 0xBBAA;
}

const swapToBigEndian = (buffer) => {
    if (!isLittleEndian()) return buffer;
    const view = new DataView(buffer);
    for (let i = 0; i < buffer.byteLength; i += 4) {
        view.setUint32(i, view.getUint32(i, false), true);
    }
    return buffer;
}

const readBINOBJ = async file => {
    const buffer = swapToBigEndian(await file.arrayBuffer());
    const intArray = new Int32Array(buffer);
    const floatArray = new Float32Array(buffer);
    let posInt = 0, posFloat = 0;

    const nV = intArray[posInt++];
    const vertices = Array.from(floatArray.subarray(posFloat, posFloat + nV));
    posFloat += nV;

    const nVt = intArray[posInt++];
    const textures = Array.from(floatArray.subarray(posFloat, posFloat + nVt));
    posFloat += nVt;

    const nVn = intArray[posInt++];
    const normals = Array.from(floatArray.subarray(posFloat, posFloat + nVn));
    posFloat += nVn;

    const nF = intArray[posInt++];
    const faceIndexes = [];
    for (let i = 0; i < nF; ++i) {
        faceIndexes.push([intArray[posInt++], intArray[posInt++], intArray[posInt++]]);
    }
    return { vertices, textures, normals, faceIndexes };
}

const writeOBJ = ({ vertices, textures, normals, faceIndexes }) => {
    let text = "";
    for (let i = 0; i < vertices.length / 3; ++i) 
        text += `v ${vertices[3*i]} ${vertices[3*i+1]} ${vertices[3*i+2]}\n`;
    for (let i = 0; i < textures.length / 2; ++i) 
        text += `vt ${textures[2*i]} ${textures[2*i+1]}\n`;
    for (let i = 0; i < normals.length / 3; ++i) 
        text += `vn ${normals[3*i]} ${normals[3*i+1]} ${normals[3*i+2]}\n`;
    
    // Corrected indexing for OBJ format
    for (let i = 0; i < faceIndexes.length; i += 3) {
        const f = (idx) => `${1 + faceIndexes[idx][0]}/${1 + faceIndexes[idx][1]}/${1 + faceIndexes[idx][2]}`;
        text += `f ${f(i)} ${f(i+1)} ${f(i+2)}\n`;
    }
    return text;
}

const save = (blob, filename) => {
    const a = document.createElement('a');
    a.download = filename;
    a.href = window.URL.createObjectURL(blob);
    a.click();
}

document.getElementById("fileInput").addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (file.name.endsWith('.binobj')) {
        const data = await readBINOBJ(file);
        save(new Blob([writeOBJ(data)], { type: 'text/plain' }), file.name.replace('.binobj', '.obj'));
    }
});
</script>
</body>
